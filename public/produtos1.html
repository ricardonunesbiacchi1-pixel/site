<script>

const API = "https://site-j3p8.onrender.com";
// 🔥 TROQUE AQUI PELO SEU LINK REAL DO RENDER

let produto = null;

function getId(){

return new URLSearchParams(
location.search
).get("id");

}

async function load(){

const res =
await fetch(API + "/products");

const data =
await res.json();

produto =
data.find(p => p.id == getId());

if(!produto){

alert("Produto não encontrado");

return;
}

document.getElementById("img").src =
produto.image;

document.getElementById("name").innerText =
produto.name;

document.getElementById("desc").innerText =
produto.description || "";

document.getElementById("price").innerText =
"R$ " + produto.price;

document.getElementById("parcelas").innerText =
"6x de R$ " +
(produto.price / 6).toFixed(2);

const rel =
document.getElementById("rel");

rel.innerHTML = "";

data.slice(0,6).forEach(p=>{

rel.innerHTML += `

<div class="card"
onclick="location.href='produtos1.html?id=${p.id}'">

<img src="${p.image}">

<p>${p.name}</p>

<b>R$ ${p.price}</b>

</div>
`;
});

carregarAvaliacoes();
}

/* FRETE */

async function calcularFrete(){

let cep =
document.getElementById("cep").value;

if(cep.length < 8){

document.getElementById("freteRes").innerText =
"CEP inválido";

return;
}

document.getElementById("freteRes").innerHTML =
"Calculando...";

try{

const res =
await fetch(API + "/calcular-frete", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({ cep })

});

const data = await res.json();

let html = "";

data.forEach(frete=>{

html += `
<div style="
margin-top:15px;
background:#1F2937;
padding:12px;
border-radius:12px;
">

<b>${frete.name}</b><br>

R$ ${frete.price}<br>

${frete.delivery_time} dias

</div>
`;
});

document.getElementById("freteRes").innerHTML =
html;

}catch(err){

document.getElementById("freteRes").innerText =
"Erro ao calcular";

}
}

/* CARRINHO */

function addCarrinho(){

let c =
JSON.parse(localStorage.getItem("carrinho")) || [];

let i =
c.find(x => x.id == produto.id);

if(i){

i.qtd++;

}else{

c.push({
...produto,
qtd:1
});

}

localStorage.setItem(
"carrinho",
JSON.stringify(c)
);

alert("Adicionado ao carrinho");
}

function comprarAgora(){

addCarrinho();

location.href = "checkout.html";
}

/* AVALIAÇÕES */

async function carregarAvaliacoes(){

try{

const res =
await fetch(API + "/reviews/" + produto.id);

const avaliacoes =
await res.json();

const lista =
document.getElementById("listaAvaliacoes");

lista.innerHTML = "";

if(avaliacoes.length === 0){

lista.innerHTML =
"<p>Nenhuma avaliação ainda.</p>";

return;
}

avaliacoes.forEach(av => {

let estrelas =
"⭐".repeat(av.nota);

lista.innerHTML += `

<div class="avaliacao-item">

<b>${av.nome}</b>

<div style="margin:8px 0">
${estrelas}
</div>

<p>${av.comentario}</p>

<button
onclick="curtirAvaliacao('${av.id}')">

👍 Curtir (${av.likes || 0})

</button>

</div>
`;
});

}catch(err){

console.log("Erro ao carregar avaliações:", err);

}
}

async function enviarAvaliacao(){

let nome =
document.getElementById("nomeAvaliacao").value;

let comentario =
document.getElementById("comentarioAvaliacao").value;

let nota =
Number(document.getElementById("notaAvaliacao").value);

if(!nome || !comentario){

alert("Preencha todos os campos");

return;
}

await fetch(API + "/reviews", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

productId: produto.id,
nome,
comentario,
nota

})
});

document.getElementById("nomeAvaliacao").value = "";
document.getElementById("comentarioAvaliacao").value = "";

carregarAvaliacoes();

}

async function curtirAvaliacao(id){

await fetch(API + "/reviews/like/" + id, {
method:"POST"
});

carregarAvaliacoes();

}

load();

</script>
