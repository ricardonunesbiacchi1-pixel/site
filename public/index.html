<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>App Loja</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter, Arial, sans-serif;
background:#0B1120;
color:#F9FAFB;
padding-bottom:80px;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:20;
background:rgba(11,17,32,.92);
backdrop-filter:blur(12px);
padding:12px;
display:flex;
gap:10px;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

.search{
flex:1;
background:#111827;
padding:14px;
border-radius:14px;
color:white;
border:none;
outline:none;
font-size:14px;
}

/* BANNER */
.banner{
margin:15px;
height:180px;
border-radius:24px;
background:linear-gradient(135deg,#2563EB,#1D4ED8,#0F172A);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-weight:700;
font-size:28px;
text-align:center;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:14px;
}

/* CARD */
.card{
background:#111827;
border-radius:20px;
overflow:hidden;
cursor:pointer;
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:12px;
}

.price{
color:#22C55E;
font-weight:700;
font-size:20px;
margin-top:8px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
background:#2563EB;
color:white;
border-radius:12px;
margin-top:10px;
font-weight:600;
cursor:pointer;
}

/* CART */
.cart-btn{
position:fixed;
bottom:90px;
right:15px;
background:#2563EB;
padding:14px 18px;
border-radius:50px;
cursor:pointer;
}

.whatsapp{
position:fixed;
bottom:160px;
right:18px;
background:#25D366;
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
}

/* CART SIDE */
#cart{
position:fixed;
top:0;
right:-100%;
width:85%;
max-width:360px;
height:100%;
background:#0F172A;
transition:.3s;
padding:15px;
overflow:auto;
}

#cart.active{right:0;}

.item{
display:flex;
gap:10px;
background:#111827;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.item img{
width:50px;
height:50px;
border-radius:8px;
object-fit:cover;
}

/* NAV */
nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:65px;
background:#0B1120;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,.05);
}

nav div{
font-size:12px;
text-align:center;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<input class="search" placeholder="Buscar produtos..." onkeyup="buscar(this.value)">
</header>

<div class="banner">
🔥 Super Ofertas
</div>

<div class="grid" id="produtos"></div>

<div class="cart-btn" onclick="openCart()">🛒 <span id="count">0</span></div>
<div class="whatsapp" onclick="window.open('https://wa.me/5551989644295')">💬</div>

<div id="cart">
<h3>Carrinho</h3>
<div id="items"></div>
<h3 id="total"></h3>
<button onclick="checkout()">Finalizar</button>
</div>

<nav>
<div>🏠<br>Home</div>
<div onclick="openCart()">🛒<br>Carrinho</div>
<div onclick="location.href='pedidos.html'">📦<br>Pedidos</div>
<div>🔥<br>Ofertas</div>
</nav>

<script>

/* ================= FIX PRINCIPAL ================= */
// agora aponta para Render (SEM ngrok)
const API = "https://site-j3p8.onrender.com/products";

let produtos = [];
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

function abrirProduto(id){
location.href = "produtos1.html?id=" + id;
}

function render(lista){

const div = document.getElementById("produtos");
div.innerHTML = "";

lista.forEach(p => {

div.innerHTML += `
<div class="card" onclick="abrirProduto(${p.id})">
<img src="${p.image || ''}">
<div class="card-body">
<h4>${p.name || 'Sem nome'}</h4>

<div class="price">
R$ ${(Number(p.price) || 0).toFixed(2)}
</div>

<button onclick='event.stopPropagation(); comprar(${p.id})'>
Comprar
</button>

</div>
</div>`;
});
}

function comprar(id){

const p = produtos.find(x => x.id === id);

let item = carrinho.find(i => i.id === id);

if(item) item.qtd++;
else carrinho.push({...p, qtd:1});

save();
openCart();
}

function save(){
localStorage.setItem("carrinho", JSON.stringify(carrinho));
update();
}

function update(){

let items = document.getElementById("items");
items.innerHTML = "";

let total = 0;
let count = 0;

carrinho.forEach(i => {

total += (i.price || 0) * i.qtd;
count += i.qtd;

items.innerHTML += `
<div class="item">
<img src="${i.image}">
<div style="flex:1">${i.name}<br>R$ ${i.price}</div>
<div>${i.qtd}</div>
</div>`;
});

document.getElementById("count").innerText = count;
document.getElementById("total").innerText = "Total: R$ " + total.toFixed(2);
}

function openCart(){
document.getElementById("cart").classList.toggle("active");
}

function checkout(){
location.href="checkout.html";
}

function buscar(t){
render(produtos.filter(p => (p.name || "").toLowerCase().includes(t.toLowerCase())));
}

async function load(){
try {
const res = await fetch(API);
produtos = await res.json();
render(produtos);
update();
} catch(err){
console.log("Erro ao carregar:", err);
}
}

load();

</script>

</body>
</html>
