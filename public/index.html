<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>App Loja</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter, Arial, sans-serif;
background:#0B1120;
color:#F9FAFB;
padding-bottom:80px;
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:20;
background:rgba(11,17,32,.92);
backdrop-filter:blur(12px);
padding:12px;
display:flex;
gap:10px;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

.search{
flex:1;
background:#111827;
padding:14px;
border-radius:14px;
color:white;
border:none;
outline:none;
font-size:14px;
transition:.2s;
}

.search:focus{
background:#1F2937;
}

/* BANNER */

.banner{
margin:15px;
height:180px;
border-radius:24px;
background:
linear-gradient(
135deg,
#2563EB,
#1D4ED8,
#0F172A
);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-weight:700;
font-size:28px;
text-align:center;
box-shadow:
0 10px 40px rgba(37,99,235,.35);
position:relative;
overflow:hidden;
}

.banner::before{
content:"";
position:absolute;
width:300px;
height:300px;
background:rgba(255,255,255,.06);
border-radius:50%;
top:-120px;
right:-100px;
}

.banner span{
font-size:14px;
margin-top:8px;
opacity:.85;
font-weight:500;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:14px;
}

/* CARD */

.card{
background:#111827;
border-radius:20px;
overflow:hidden;
cursor:pointer;
transition:.25s;
box-shadow:
0 10px 30px rgba(0,0,0,.25);
border:1px solid rgba(255,255,255,.04);
}

.card:hover{
transform:translateY(-5px);
background:#1F2937;
}

.card:active{
transform:scale(.98);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:12px;
}

.card-body h4{
margin:0;
font-size:15px;
font-weight:600;
line-height:1.4;
min-height:40px;
}

.price{
color:#22C55E;
font-weight:700;
font-size:22px;
margin-top:8px;
}

/* BUTTONS */

button{
width:100%;
padding:12px;
border:none;
background:
linear-gradient(
135deg,
#2563EB,
#3B82F6
);
color:white;
border-radius:12px;
margin-top:10px;
font-weight:600;
cursor:pointer;
transition:.2s;
font-family:Inter;
}

button:hover{
opacity:.92;
transform:translateY(-1px);
}

/* CART FLOAT */

.cart-btn{
position:fixed;
bottom:90px;
right:15px;
background:
linear-gradient(
135deg,
#2563EB,
#3B82F6
);
padding:15px 18px;
border-radius:50px;
z-index:30;
box-shadow:
0 10px 30px rgba(37,99,235,.4);
font-weight:600;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:165px;
right:20px;
width:62px;
height:62px;
background:#25D366;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
cursor:pointer;
box-shadow:
0 10px 30px rgba(37,211,102,.4);
z-index:999;
transition:.2s;
}

.whatsapp:hover{
transform:scale(1.05);
}

/* OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.65);
opacity:0;
visibility:hidden;
transition:.3s;
z-index:50;
backdrop-filter:blur(4px);
}

.overlay.active{
opacity:1;
visibility:visible;
}

/* CART */

#cart{
position:fixed;
top:0;
right:-100%;
width:85%;
max-width:370px;
height:100%;
background:#0F172A;
z-index:100;
padding:18px;
transition:.3s;
overflow-y:auto;
box-shadow:
-10px 0 30px rgba(0,0,0,.4);
}

#cart.active{
right:0;
}

.item{
display:flex;
gap:10px;
align-items:center;
background:#111827;
padding:12px;
border-radius:14px;
margin-bottom:10px;
}

.item img{
width:55px;
height:55px;
border-radius:10px;
object-fit:cover;
}

.qty{
display:flex;
align-items:center;
gap:8px;
}

.qty button{
width:30px;
height:30px;
padding:0;
margin:0;
border-radius:8px;
}

/* NAVBAR */

nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:rgba(11,17,32,.95);
backdrop-filter:blur(12px);
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,.05);
z-index:200;
}

nav div{
font-size:12px;
text-align:center;
opacity:.9;
cursor:pointer;
transition:.2s;
}

nav div:hover{
opacity:1;
transform:translateY(-2px);
}

/* RESPONSIVO */

@media(max-width:768px){

.banner{
height:160px;
font-size:24px;
}

.card img{
height:160px;
}

}

</style>
</head>

<body>

<header>

<input
class="search"
placeholder="Buscar produtos..."
onkeyup="buscar(this.value)"
>

</header>

<div class="banner">

🔥 SUPER OFERTAS

<span>
Frete grátis acima de R$ 199
</span>

</div>

<div class="grid" id="produtos"></div>

<div class="cart-btn" onclick="openCart()">
🛒 <span id="count">0</span>
</div>

<div class="whatsapp" onclick="abrirWhatsapp()">
💬
</div>

<div class="overlay"
onclick="closeCart()"
id="overlay">
</div>

<div id="cart">

<h3>Carrinho</h3>

<div id="items"></div>

<h3 id="total"></h3>

<button onclick="checkout()">
Finalizar Compra
</button>

</div>

<nav>

<div>
🏠<br>Home
</div>

<div onclick="openCart()">
🛒<br>Carrinho
</div>

<div onclick="location.href='pedidos.html'">
📦<br>Pedidos
</div>

<div>
🔥<br>Ofertas
</div>

</nav>

<script>

let produtos = [];

const API =
"https://juncture-erasure-gangway.ngrok-free.dev/products";

let carrinho =
JSON.parse(localStorage.getItem("carrinho")) || [];

const produtosDiv =
document.getElementById("produtos");

const itemsDiv =
document.getElementById("items");

function abrirProduto(id){

    window.location.href =
    "produtos1.html?id=" + id;
}

function abrirWhatsapp(){

    window.open(
        "https://wa.me/5551989644295?text=Olá,%20vim%20pela%20loja%20e%20preciso%20de%20ajuda",
        "_blank"
    );
}

function render(lista){

produtosDiv.innerHTML = "";

lista.forEach(p=>{

produtosDiv.innerHTML += `

<div class="card"
onclick="abrirProduto(${p.id})">

<img src="${p.image}">

<div class="card-body">

<h4>${p.name}</h4>

<div class="price">
R$ ${p.price.toFixed(2)}
</div>

<button
onclick='event.stopPropagation();
comprarAgora(${JSON.stringify(p)})'>

Comprar Agora

</button>

</div>
</div>
`;
});
}

function buscar(txt){

txt = txt.toLowerCase();

const filtrados = produtos.filter(p=>

p.name.toLowerCase().includes(txt)

);

render(filtrados);
}

function comprarAgora(p){

let item =
carrinho.find(i => i.id === p.id);

if(item){

item.qtd++;

}else{

carrinho.push({
id:p.id,
name:p.name,
price:Number(p.price),
image:p.image,
qtd:1
});

}

save();

window.location.href = "checkout.html";
}

function openCart(){

document.getElementById("cart")
.classList.add("active");

document.getElementById("overlay")
.classList.add("active");
}

function closeCart(){

document.getElementById("cart")
.classList.remove("active");

document.getElementById("overlay")
.classList.remove("active");
}

function change(id,d){

let i =
carrinho.find(i=>i.id===id);

i.qtd += d;

if(i.qtd<=0){

carrinho =
carrinho.filter(x=>x.id!==id);

}

save();
}

function save(){

localStorage.setItem(
"carrinho",
JSON.stringify(carrinho)
);

update();
}

function update(){

itemsDiv.innerHTML = "";

let total = 0;
let count = 0;

carrinho.forEach(i=>{

total += i.price*i.qtd;

count += i.qtd;

itemsDiv.innerHTML += `

<div class="item">

<img src="${i.image}">

<div style="flex:1">

${i.name}

<br>

R$ ${i.price}

</div>

<div class="qty">

<button onclick="change(${i.id},-1)">
-
</button>

${i.qtd}

<button onclick="change(${i.id},1)">
+
</button>

</div>

</div>
`;
});

document.getElementById("count")
.innerText = count;

document.getElementById("total")
.innerText =
"Total R$ " + total.toFixed(2);
}

function checkout(){

location.href = "checkout.html";
}

async function carregarProdutos(){

    try{

        const res = await fetch(API);

        produtos = await res.json();

        render(produtos);

        update();

    }catch(err){

        console.log(
        "Erro ao carregar produtos:",
        err
        );
    }
}

carregarProdutos();

</script>

</body>
</html>
