<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>App Loja</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* (SEU CSS CONTINUA IGUAL - NÃO PRECISA MEXER) */
</style>

</head>

<body>

<header>
<input
class="search"
placeholder="Buscar produtos..."
onkeyup="buscar(this.value)"
>
</header>

<div class="banner">
🔥 SUPER OFERTAS
<span>Frete grátis acima de R$ 199</span>
</div>

<div class="grid" id="produtos"></div>

<div class="cart-btn" onclick="openCart()">
🛒 <span id="count">0</span>
</div>

<div class="whatsapp" onclick="abrirWhatsapp()">💬</div>

<div class="overlay" onclick="closeCart()" id="overlay"></div>

<div id="cart">
<h3>Carrinho</h3>
<div id="items"></div>
<h3 id="total"></h3>
<button onclick="checkout()">Finalizar Compra</button>
</div>

<nav>
<div>🏠<br>Home</div>
<div onclick="openCart()">🛒<br>Carrinho</div>
<div onclick="location.href='pedidos.html'">📦<br>Pedidos</div>
<div>🔥<br>Ofertas</div>
</nav>

<script>

/* ================= API CORRIGIDA ================= */

const API = "https://site-j3p8.onrender.com";

/* ================= VARIÁVEIS ================= */

let produtos = [];

let carrinho =
JSON.parse(localStorage.getItem("carrinho")) || [];

const produtosDiv = document.getElementById("produtos");
const itemsDiv = document.getElementById("items");

/* ================= PRODUTOS ================= */

function abrirProduto(id){
    window.location.href = "produtos1.html?id=" + id;
}

function abrirWhatsapp(){
    window.open(
        "https://wa.me/5551989644295?text=Olá,%20vim%20pela%20loja%20e%20preciso%20de%20ajuda",
        "_blank"
    );
}

function render(lista){

produtosDiv.innerHTML = "";

lista.forEach(p=>{

produtosDiv.innerHTML += `
<div class="card"
onclick="abrirProduto('${p.id}')">

<img src="${p.image}">

<div class="card-body">

<h4>${p.name}</h4>

<div class="price">
R$ {Number(p.price).toFixed(2)}
</div>

<button
onclick='event.stopPropagation();
comprarAgora(${JSON.stringify(p)})'>

Comprar Agora

</button>

</div>
</div>
`;
});
}

function buscar(txt){

txt = txt.toLowerCase();

const filtrados = produtos.filter(p=>
p.name.toLowerCase().includes(txt)
);

render(filtrados);
}

/* ================= CARRINHO ================= */

function comprarAgora(p){

let item = carrinho.find(i => i.id === p.id);

if(item){
item.qtd++;
}else{
carrinho.push({
id:p.id,
name:p.name,
price:Number(p.price),
image:p.image,
qtd:1
});
}

save();

window.location.href = "checkout.html";
}

function openCart(){
document.getElementById("cart").classList.add("active");
document.getElementById("overlay").classList.add("active");
}

function closeCart(){
document.getElementById("cart").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

function change(id,d){

let i = carrinho.find(i=>i.id===id);

i.qtd += d;

if(i.qtd<=0){
carrinho = carrinho.filter(x=>x.id!==id);
}

save();
}

function save(){
localStorage.setItem("carrinho", JSON.stringify(carrinho));
update();
}

function update(){

itemsDiv.innerHTML = "";

let total = 0;
let count = 0;

carrinho.forEach(i=>{

total += i.price*i.qtd;
count += i.qtd;

itemsDiv.innerHTML += `
<div class="item">

<img src="${i.image}">

<div style="flex:1">
${i.name}
<br>
R$ ${i.price}
</div>

<div class="qty">

<button onclick="change(${i.id},-1)">-</button>

${i.qtd}

<button onclick="change(${i.id},1)">+</button>

</div>

</div>
`;
});

document.getElementById("count").innerText = count;
document.getElementById("total").innerText =
"Total R$ " + total.toFixed(2);
}

function checkout(){
location.href = "checkout.html";
}

/* ================= LOAD PRODUTOS ================= */

async function carregarProdutos(){

try{

const res = await fetch(API + "/products");

produtos = await res.json();

render(produtos);

update();

}catch(err){

console.log("Erro ao carregar produtos:", err);

}

}

carregarProdutos();

</script>

</body>
</html>
